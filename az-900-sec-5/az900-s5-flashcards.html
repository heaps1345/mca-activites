<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 Section 5 — Management & Monitoring Flash Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1A1A2E; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  h1 { font-size: 1.6rem; margin-bottom: 5px; text-align: center; }
  .subtitle { color: #9CA3AF; font-size: 0.9rem; margin-bottom: 25px; text-align: center; }
  .counter { color: #E05C00; font-size: 1rem; font-weight: 700; margin-bottom: 15px; }
  .card-container { perspective: 1000px; width: 100%; max-width: 600px; height: 320px; cursor: pointer; margin-bottom: 20px; }
  .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 35px; text-align: center; }
  .card-front { background: linear-gradient(135deg, #16213E, #1A1A2E); border: 2px solid #E05C00; }
  .card-front .label { color: #E05C00; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
  .card-front .question { font-size: 1.2rem; line-height: 1.5; font-weight: 500; }
  .card-back { background: #E05C00; transform: rotateY(180deg); }
  .card-back .label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
  .card-back .answer { font-size: 1.05rem; line-height: 1.5; font-weight: 500; }
  .hint { color: #6B7280; font-size: 0.8rem; margin-bottom: 20px; }
  .nav { display: flex; gap: 15px; }
  .nav button { background: none; border: 2px solid #E05C00; color: #E05C00; padding: 10px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .nav button:hover { background: #E05C00; color: #fff; }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .nav button:disabled:hover { background: none; color: #E05C00; }
  .progress { width: 100%; max-width: 600px; height: 4px; background: #16213E; border-radius: 2px; margin-top: 20px; }
  .progress-bar { height: 100%; background: #E05C00; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<h1>Management & Monitoring — Flash Cards</h1>
<p class="subtitle">AZ-900 Section 5 · Click a card to flip it</p>
<div class="counter" id="counter">1 / 15</div>
<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="label">Question</div>
      <div class="question" id="question"></div>
    </div>
    <div class="card-face card-back">
      <div class="label">Answer</div>
      <div class="answer" id="answer"></div>
    </div>
  </div>
</div>
<p class="hint">Click the card to reveal the answer</p>
<div class="nav">
  <button id="prevBtn" onclick="prev()">← Previous</button>
  <button id="nextBtn" onclick="next()">Next →</button>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<script>
const cards = [
  { q: "What is the Azure Portal?", a: "A web-based graphical interface for managing Azure resources. Accessible from any browser at portal.azure.com. Best for visual exploration and one-off tasks, but not ideal for repeatable or automated deployments." },
  { q: "What is the Azure CLI?", a: "A cross-platform command-line tool for managing Azure resources. Uses a bash-style syntax (e.g. az vm create). Runs on Windows, macOS, and Linux. Ideal for scripting and automation." },
  { q: "What is Azure PowerShell?", a: "A set of cmdlets for managing Azure resources from PowerShell (e.g. New-AzVM). Uses a verb-noun syntax familiar to Windows administrators. Available on Windows, macOS, and Linux via PowerShell Core." },
  { q: "What is Azure Cloud Shell?", a: "A browser-based shell environment available directly from the Azure Portal. Supports both Bash (Azure CLI) and PowerShell. Requires an Azure Storage account for persistent file storage. No local installation needed." },
  { q: "What is Azure Monitor?", a: "The central platform for collecting, analysing, and acting on telemetry from Azure resources. Collects metrics (numeric performance data) and logs (detailed event records). Powers alerts, dashboards, and autoscale." },
  { q: "What are Azure Monitor Metrics?", a: "Numeric time-series data collected at regular intervals — CPU usage, memory, disk IOPS, network throughput. Stored for 93 days. Best for real-time monitoring, dashboards, and triggering autoscale rules." },
  { q: "What are Azure Monitor Logs?", a: "Detailed event and diagnostic data stored in a Log Analytics workspace. Queried using Kusto Query Language (KQL). Best for deep analysis, troubleshooting, and long-term trend identification." },
  { q: "What is Azure Monitor Alerts?", a: "Automated notifications triggered when a metric or log condition is met. Can send emails, SMS, or trigger automated actions like scaling or running a Logic App. Configured with an alert rule, condition, and action group." },
  { q: "What is Application Insights?", a: "A feature of Azure Monitor for application performance management (APM). Monitors live web applications, detects performance anomalies, tracks request rates, response times, failure rates, and user behaviour." },
  { q: "What is Azure Advisor?", a: "A free personalised recommendation engine that analyses your Azure configuration and usage. Provides best-practice recommendations across five categories: Cost, Security, Reliability, Operational Excellence, and Performance." },
  { q: "What is Azure Service Health?", a: "A suite of services that keeps you informed about Azure platform issues. Includes Azure Status (global), Service Health (your specific services and regions), and Resource Health (individual resource status)." },
  { q: "What is the difference between Azure Advisor and Azure Service Health?", a: "Advisor gives proactive recommendations to improve your setup. Service Health tells you about Azure platform problems affecting your services. Advisor = your configuration. Service Health = Microsoft's platform." },
  { q: "What is Infrastructure as Code (IaC)?", a: "Managing infrastructure through machine-readable definition files instead of manual configuration. Enables version control, repeatable deployments, consistency across environments, and automated provisioning." },
  { q: "What are ARM templates?", a: "JSON files that declaratively define Azure infrastructure and configuration. You describe the desired end state; Azure Resource Manager figures out how to get there. Idempotent — running the same template twice produces the same result." },
  { q: "What is Bicep?", a: "A domain-specific language (DSL) that simplifies authoring ARM templates. Uses a cleaner, more readable syntax than raw JSON. Compiles down to ARM templates. Designed specifically for Azure deployments." },
];
let current = 0;
const card = document.getElementById('card'), question = document.getElementById('question'), answer = document.getElementById('answer'), counter = document.getElementById('counter'), prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), progressBar = document.getElementById('progressBar');
function render() { card.classList.remove('flipped'); setTimeout(() => { question.textContent = cards[current].q; answer.textContent = cards[current].a; }, 150); counter.textContent = `${current+1} / ${cards.length}`; prevBtn.disabled = current === 0; nextBtn.disabled = current === cards.length-1; progressBar.style.width = `${((current+1)/cards.length)*100}%`; }
document.getElementById('cardContainer').addEventListener('click', () => card.classList.toggle('flipped'));
function next() { if (current < cards.length-1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => { if (e.key==='ArrowRight') next(); if (e.key==='ArrowLeft') prev(); if (e.key===' ') { e.preventDefault(); card.classList.toggle('flipped'); } });
render();
</script>
</body>
</html>
