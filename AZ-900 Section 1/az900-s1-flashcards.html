<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 Section 1 — Cloud Concepts Flash Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1A1A2E; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  h1 { font-size: 1.6rem; margin-bottom: 5px; text-align: center; }
  .subtitle { color: #9CA3AF; font-size: 0.9rem; margin-bottom: 25px; text-align: center; }
  .counter { color: #E05C00; font-size: 1rem; font-weight: 700; margin-bottom: 15px; }
  .card-container { perspective: 1000px; width: 100%; max-width: 600px; height: 320px; cursor: pointer; margin-bottom: 20px; }
  .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 35px; text-align: center; }
  .card-front { background: linear-gradient(135deg, #16213E, #1A1A2E); border: 2px solid #E05C00; }
  .card-front .label { color: #E05C00; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
  .card-front .question { font-size: 1.2rem; line-height: 1.5; font-weight: 500; }
  .card-back { background: #E05C00; transform: rotateY(180deg); }
  .card-back .label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
  .card-back .answer { font-size: 1.1rem; line-height: 1.5; font-weight: 500; }
  .hint { color: #6B7280; font-size: 0.8rem; margin-bottom: 20px; }
  .nav { display: flex; gap: 15px; }
  .nav button { background: none; border: 2px solid #E05C00; color: #E05C00; padding: 10px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .nav button:hover { background: #E05C00; color: #fff; }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .nav button:disabled:hover { background: none; color: #E05C00; }
  .progress { width: 100%; max-width: 600px; height: 4px; background: #16213E; border-radius: 2px; margin-top: 20px; }
  .progress-bar { height: 100%; background: #E05C00; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<h1>Cloud Concepts — Flash Cards</h1>
<p class="subtitle">AZ-900 Section 1 · Click a card to flip it</p>
<div class="counter" id="counter">1 / 15</div>
<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="label">Question</div>
      <div class="question" id="question"></div>
    </div>
    <div class="card-face card-back">
      <div class="label">Answer</div>
      <div class="answer" id="answer"></div>
    </div>
  </div>
</div>
<p class="hint">Click the card to reveal the answer</p>
<div class="nav">
  <button id="prevBtn" onclick="prev()">← Previous</button>
  <button id="nextBtn" onclick="next()">Next →</button>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<script>
const cards = [
  { q: "What is cloud computing?", a: "The delivery of computing resources — servers, storage, databases, networking, software — over the internet on a pay-as-you-go basis." },
  { q: "Name the five NIST characteristics of cloud computing.", a: "On-demand self-service, broad network access, resource pooling, rapid elasticity, and measured service (pay for what you use)." },
  { q: "What is the difference between CapEx and OpEx?", a: "CapEx is a large upfront investment in physical infrastructure. OpEx is an ongoing, consumption-based cost model — you pay for what you use." },
  { q: "What is IaaS?", a: "Infrastructure as a Service. The cloud provider manages physical hardware, networking, and virtualisation. You manage the OS, middleware, runtime, data, and applications." },
  { q: "What is PaaS?", a: "Platform as a Service. The provider manages everything up to the runtime. You manage your application code and data. Examples: Azure App Service, Azure SQL Database." },
  { q: "What is SaaS?", a: "Software as a Service. The provider manages everything. You consume the application. Examples: Microsoft 365, Outlook, Teams." },
  { q: "As you move from IaaS → PaaS → SaaS, what happens to the customer's responsibility?", a: "It decreases. The cloud provider takes on progressively more responsibility. But the customer is always responsible for their data, identities, and access management." },
  { q: "What is a public cloud?", a: "Cloud resources owned and operated by a third-party provider (e.g. Microsoft Azure) and shared across multiple organisations over the internet." },
  { q: "What is a private cloud?", a: "Cloud infrastructure used exclusively by a single organisation. Can be hosted on-premises or by a third party. Offers greater control and security." },
  { q: "What is a hybrid cloud?", a: "A combination of public and private cloud, connected and orchestrated together. The most common real-world deployment model." },
  { q: "What is the Shared Responsibility Model?", a: "The division of security obligations between the cloud provider and the customer. Microsoft manages physical infrastructure; you manage your data, identities, and configurations." },
  { q: "Name three things Microsoft is ALWAYS responsible for in Azure.", a: "Physical data centres and hardware, network hardware, and the hypervisor (virtualisation layer)." },
  { q: "Name three things the customer is ALWAYS responsible for in Azure.", a: "Their data, user identities and access management, and the security configuration of the services they consume." },
  { q: "What is high availability in cloud computing?", a: "The ability of a system to remain operational and accessible with minimal downtime, typically achieved through redundancy and failover mechanisms." },
  { q: "What is the most common cause of cloud security incidents?", a: "Customer misconfiguration — not a failure by the cloud provider. Misconfigured access controls, open storage accounts, and weak identity policies are the top causes." },
];
let current = 0;
const card = document.getElementById('card');
const question = document.getElementById('question');
const answer = document.getElementById('answer');
const counter = document.getElementById('counter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');

function render() {
  card.classList.remove('flipped');
  setTimeout(() => {
    question.textContent = cards[current].q;
    answer.textContent = cards[current].a;
  }, 150);
  counter.textContent = `${current + 1} / ${cards.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === cards.length - 1;
  progressBar.style.width = `${((current + 1) / cards.length) * 100}%`;
}
document.getElementById('cardContainer').addEventListener('click', () => card.classList.toggle('flipped'));
function next() { if (current < cards.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight') next(); if (e.key === 'ArrowLeft') prev(); if (e.key === ' ') { e.preventDefault(); card.classList.toggle('flipped'); } });
render();
</script>
</body>
</html>
