<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 Section 3 — Core Azure Services Flash Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1A1A2E; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  h1 { font-size: 1.6rem; margin-bottom: 5px; text-align: center; }
  .subtitle { color: #9CA3AF; font-size: 0.9rem; margin-bottom: 25px; text-align: center; }
  .counter { color: #E05C00; font-size: 1rem; font-weight: 700; margin-bottom: 15px; }
  .card-container { perspective: 1000px; width: 100%; max-width: 600px; height: 320px; cursor: pointer; margin-bottom: 20px; }
  .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 35px; text-align: center; }
  .card-front { background: linear-gradient(135deg, #16213E, #1A1A2E); border: 2px solid #E05C00; }
  .card-front .label { color: #E05C00; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
  .card-front .question { font-size: 1.2rem; line-height: 1.5; font-weight: 500; }
  .card-back { background: #E05C00; transform: rotateY(180deg); }
  .card-back .label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
  .card-back .answer { font-size: 1.05rem; line-height: 1.5; font-weight: 500; }
  .hint { color: #6B7280; font-size: 0.8rem; margin-bottom: 20px; }
  .nav { display: flex; gap: 15px; }
  .nav button { background: none; border: 2px solid #E05C00; color: #E05C00; padding: 10px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .nav button:hover { background: #E05C00; color: #fff; }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .nav button:disabled:hover { background: none; color: #E05C00; }
  .progress { width: 100%; max-width: 600px; height: 4px; background: #16213E; border-radius: 2px; margin-top: 20px; }
  .progress-bar { height: 100%; background: #E05C00; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<h1>Core Azure Services — Flash Cards</h1>
<p class="subtitle">AZ-900 Section 3 · Click a card to flip it</p>
<div class="counter" id="counter">1 / 15</div>
<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="label">Question</div>
      <div class="question" id="question"></div>
    </div>
    <div class="card-face card-back">
      <div class="label">Answer</div>
      <div class="answer" id="answer"></div>
    </div>
  </div>
</div>
<p class="hint">Click the card to reveal the answer</p>
<div class="nav">
  <button id="prevBtn" onclick="prev()">← Previous</button>
  <button id="nextBtn" onclick="next()">Next →</button>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<script>
const cards = [
  { q: "What is Azure Virtual Machines?", a: "An IaaS compute service that lets you create Windows or Linux VMs in the cloud. You manage the OS, patches, and applications. Best for lift-and-shift migrations or when you need full control." },
  { q: "What is Azure App Service?", a: "A PaaS service for hosting web apps, REST APIs, and mobile backends. Supports .NET, Java, Node.js, Python, and PHP. You deploy your code — Azure handles the infrastructure." },
  { q: "What are Azure Container Instances (ACI)?", a: "The fastest and simplest way to run a container in Azure. No VM management required. Best for short-lived tasks, batch jobs, or simple applications that don't need orchestration." },
  { q: "What is Azure Kubernetes Service (AKS)?", a: "A managed container orchestration service based on Kubernetes. Used for deploying, scaling, and managing containerised applications at scale. Azure manages the control plane." },
  { q: "What is Azure Blob Storage?", a: "Object storage for unstructured data — documents, images, videos, backups. Offers three access tiers: Hot (frequent access), Cool (infrequent, 30+ days), and Archive (rare access, 180+ days)." },
  { q: "What are the three Blob Storage access tiers?", a: "Hot — frequent access, highest storage cost, lowest access cost. Cool — infrequent access (30+ days), lower storage cost. Archive — rarely accessed (180+ days), lowest storage cost but highest retrieval cost and latency." },
  { q: "What is Azure Files?", a: "Fully managed file shares in the cloud accessible via SMB or NFS protocols. Can be mounted by Windows, Linux, and macOS. Useful for replacing or extending on-premises file servers." },
  { q: "What is Azure Disk Storage?", a: "Managed block-level storage volumes for Azure VMs. Available as Standard HDD, Standard SSD, Premium SSD, and Ultra Disk — each offering different performance and cost profiles." },
  { q: "What is Azure Virtual Network (VNet)?", a: "The fundamental networking building block in Azure. VNets let your Azure resources communicate with each other, the internet, and on-premises networks. You control IP addressing, subnets, routing, and security." },
  { q: "What is a Network Security Group (NSG)?", a: "A set of security rules that filter inbound and outbound network traffic to Azure resources. Each rule specifies source, destination, port, protocol, and allow/deny action. Acts as a basic firewall." },
  { q: "What is Azure ExpressRoute?", a: "A private, dedicated connection between your on-premises network and Azure — it does not go over the public internet. Offers higher reliability, faster speeds, and lower latency than a VPN." },
  { q: "What is Azure SQL Database?", a: "A fully managed PaaS relational database based on SQL Server. Microsoft handles patching, backups, and high availability. Supports built-in intelligence for performance tuning." },
  { q: "What is Azure Cosmos DB?", a: "A globally distributed, multi-model NoSQL database. Offers single-digit millisecond latency and 99.999% availability. Supports multiple APIs including SQL, MongoDB, Cassandra, and Gremlin." },
  { q: "What is Azure Functions?", a: "A serverless compute service that runs small pieces of code (functions) in response to events — HTTP requests, timer triggers, queue messages, etc. You pay only for execution time. No infrastructure to manage." },
  { q: "What is Azure Logic Apps?", a: "A serverless integration service for automating workflows and connecting apps, data, and services. Uses a visual designer with hundreds of pre-built connectors (Office 365, Salesforce, SAP, etc.). No code required." },
];
let current = 0;
const card = document.getElementById('card'), question = document.getElementById('question'), answer = document.getElementById('answer'), counter = document.getElementById('counter'), prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), progressBar = document.getElementById('progressBar');
function render() { card.classList.remove('flipped'); setTimeout(() => { question.textContent = cards[current].q; answer.textContent = cards[current].a; }, 150); counter.textContent = `${current+1} / ${cards.length}`; prevBtn.disabled = current === 0; nextBtn.disabled = current === cards.length-1; progressBar.style.width = `${((current+1)/cards.length)*100}%`; }
document.getElementById('cardContainer').addEventListener('click', () => card.classList.toggle('flipped'));
function next() { if (current < cards.length-1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => { if (e.key==='ArrowRight') next(); if (e.key==='ArrowLeft') prev(); if (e.key===' ') { e.preventDefault(); card.classList.toggle('flipped'); } });
render();
</script>
</body>
</html>
